services:
  # 1. Node.js Backend (Express + Socket.io)
  - type: web
    name: pbl2-node-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # You must set this manually in the Render Dashboard!
        
  # 2. Python Backend (FastAPI + ML Engine)
  - type: web
    name: pbl2-python-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000

  # 3. Frontend (Next.js App)
  - type: web
    name: pbl2-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: pbl2-node-backend
          property: hostport # This auto-links the Node backend URL
      - key: NEXTAUTH_URL
        # We temporarily set this to localhost, Render will overwrite it if we configure custom domains later. 
        # But you should update this in the dashboard to the final frontend URL.
        sync: false 
      - key: NEXTAUTH_SECRET
        generateValue: true
